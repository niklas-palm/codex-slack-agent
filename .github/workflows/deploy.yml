name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Test and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Test runtime
        working-directory: runtime
        run: |
          python -m pip install uv==0.8.14
          uv sync --frozen
          uv run ruff check .
          uv run pytest

      - name: Test infrastructure
        working-directory: infra
        run: |
          npm ci
          npm run build
          npm test

      - name: Enable ARM64 container builds
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: us-east-1
          mask-aws-account-id: true
          role-session-name: SlackCodexDeploy
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

      - name: Deploy
        working-directory: infra
        run: |
          npm run deploy -- \
            --require-approval never \
            -c githubRepository="$GITHUB_REPOSITORY" \
            -c githubOidcSubject="${{ vars.AWS_OIDC_SUBJECT }}" \
            -c bedrockRegion=us-east-1 \
            -c bedrockModelId=openai.gpt-5.6-terra
