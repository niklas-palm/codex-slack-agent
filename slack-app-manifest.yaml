_metadata:
  major_version: 2
  minor_version: 1
display_information:
  name: Codex
  description: Slack-triggered code agent running in Amazon Bedrock AgentCore
features:
  bot_user:
    display_name: Codex
    always_online: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - chat:write
      - files:read
      - files:write
      - groups:history
      - reactions:write
settings:
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
